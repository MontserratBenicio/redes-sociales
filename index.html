<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redes Sociales</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
        }
        h2 { color: #1a1a1a; margin-bottom: 20px; font-size: 22px; }

        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            padding: 16px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            color: white; 
            transition: transform 0.1s ease;
        }

        .btn:active { transform: scale(0.96); }

        .facebook { background-color: #1877F2; }
        .instagram { background: linear-gradient(45deg,#F58529,#DD2A7B,#8134AF,#515BD4); }
        .spotify { background-color: #1DB954; }
        .youtube { background-color: #FF0000; }

        .icon { margin-right: 10px; font-size: 18px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Principe de Paz</h2>
    <h2>Síguenos en redes</h2>

    <button onclick="abrirFacebook()" class="btn facebook">
        <span class="icon">📘</span> Facebook
    </button>

    <button onclick="abrirInstagram()" class="btn instagram">
        <span class="icon">📸</span> Instagram
    </button>

    <button onclick="abrirSpotify()" class="btn spotify">
        <span class="icon">🎵</span> Spotify
    </button>

    <button onclick="abrirYouTube()" class="btn youtube">
        <span class="icon">▶️</span> YouTube
    </button>
</div>

</body>
</html>
