<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redes Sociales</title>

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #d9e9ff, #f5f9ff);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .card { 
            background: rgba(255,255,255,0.95);
            padding: 30px; 
            border-radius: 22px; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.12); 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
            backdrop-filter: blur(10px);
        }

        h2 { 
            color: #1e4f9a; 
            margin-bottom: 8px; 
            font-size: 22px; 
        }

        p {
            color: #6b7a90;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s ease;
            background: white;
            border: 2px solid #1e5aa8;
            color: #1e5aa8;
        }

        .btn:hover {
            background: #1e5aa8;
            color: white;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .icon { margin-right: 10px; font-size: 18px; }

        /* opcional: estilos por red */
        .instagram { border-color: #8134AF; color: #8134AF; }
        .instagram:hover { background: linear-gradient(45deg,#F58529,#DD2A7B,#8134AF,#515BD4); color: white; border: none; }

        .facebook { border-color: #1e5aa8; }
        .spotify { border-color: #1DB954; color: #1DB954; }
        .spotify:hover { background: #1DB954; color: white; border: none; }
    </style>
</head>

<body>

<div class="card">
    <h2>Príncipe de Paz</h2>
    <p>Síguenos en nuestras redes sociales</p>

    <button onclick="abrirFacebook()" class="btn facebook">
        <span class="icon">📘</span> Facebook
    </button>

    <button onclick="abrirInstagram()" class="btn instagram">
        <span class="icon">📸</span> Instagram
    </button>

    <button onclick="abrirSpotify()" class="btn spotify">
        <span class="icon">🎵</span> Spotify
    </button>
</div>

<script>

    function abrirFacebook() {
        const facebookURL = "https://www.facebook.com/share/18ktMoP6Jc/";
        window.location.href = "fb://facewebmodal/f?href=" + facebookURL;

        setTimeout(() => {
            window.open(facebookURL, '_blank');
        }, 1200);
    }

    function abrirInstagram() {
        const instagramURL = "https://www.instagram.com/ebenezer_chalco?igsh=MXBneWdua3ZheXduYg==";
        window.location.href = "instagram://app";

        setTimeout(() => {
            window.open(instagramURL, '_blank');
        }, 1200);
    }

    function abrirSpotify() {
        const url = "https://open.spotify.com/episode/2E0mOvu2bqqvFAVLIU0AHj?si=BzwD8RtoRb2KgsCn-JtLZA";
        window.open(url, '_blank');
    }

</script>

</body>
</html>
