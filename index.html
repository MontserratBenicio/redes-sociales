<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redes Sociales</title>

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #eaf3ff, #f7fbff);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .card { 
            background: #1e5aa8; /* azul principal */
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
            color: white;
        }

        h2 { 
            color: #ffffff; 
            margin-bottom: 10px; 
            font-size: 22px; 
        }

        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            padding: 16px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            color: white; 
            transition: transform 0.1s ease;
        }

        .btn:active { transform: scale(0.96); }

        .facebook { background-color: #0d4ea6; }
        .instagram { background: linear-gradient(45deg,#F58529,#DD2A7B,#8134AF,#515BD4); }
        .spotify { background-color: #1DB954; }
        .youtube { background-color: #FF0000; }

        .icon { margin-right: 10px; font-size: 18px; }
    </style>
</head>

<body>

<div class="card">
    <h2>Príncipe de Paz</h2>
    <h2>Síguenos en redes</h2>

    <button onclick="abrirFacebook()" class="btn facebook">
        <span class="icon">📘</span> Facebook
    </button>

    <button onclick="abrirInstagram()" class="btn instagram">
        <span class="icon">📸</span> Instagram
    </button>

    <button onclick="abrirSpotify()" class="btn spotify">
        <span class="icon">🎵</span> Spotify
    </button>
</div>

<script>

    function abrirFacebook() {
        const facebookURL = "https://www.facebook.com/share/18ktMoP6Jc/";

        // intenta abrir app
        window.location.href = "fb://facewebmodal/f?href=" + facebookURL;

        setTimeout(() => {
            window.open(facebookURL, '_blank');
        }, 1200);
    }

    function abrirInstagram() {
        const instagramURL = "https://www.instagram.com/ebenezer_chalco?igsh=MXBneWdua3ZheXduYg==";

        window.location.href = "instagram://app";

        setTimeout(() => {
            window.open(instagramURL, '_blank');
        }, 1200);
    }

    function abrirSpotify() {
        const url = "https://open.spotify.com/episode/2E0mOvu2bqqvFAVLIU0AHj?si=BzwD8RtoRb2KgsCn-JtLZA";
        window.open(url, '_blank');
    }

</script>

</body>
</html>
